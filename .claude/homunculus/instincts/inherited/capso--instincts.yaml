# Capso  Workflow Feature Implementation With Shortcut And Settings

## Action

Follow the feature-implementation-with-shortcut-and-settings workflow:
1. Implement feature logic in coordinator/controller (e.g., CaptureCoordinator.swift)
2. Add new shortcut name to shortcut settings view (e.g., ShortcutSettingsView.swift)
3. Wire shortcut in app delegate (e.g., AppDelegate.swift)
4. Update settings model to persist new shortcut or feature state (e.g., AppSettings.swift)
5. Update preferences view model if necessary (e.g., PreferencesViewModel.swift)

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: App/Sources/AppDelegate.swift, App/Sources/Capture/CaptureCoordinator.swift, App/Sources/Preferences/PreferencesViewModel.swift

